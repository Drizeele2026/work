name: Duty Reminder

on:
  workflow_dispatch:
    inputs:
      org:
        description: "只发送指定组织，例如 shm；留空则遍历所有启用组织"
        type: string
        default: ""
      force:
        description: "跳过去重，强制发送一条（用于测试）"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: duty-reminder
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Feishu duty reminder
        id: send_reminder
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_WEBHOOK_TAKEAWAY: ${{ secrets.FEISHU_WEBHOOK_TAKEAWAY }}
          FEISHU_WEBHOOK_SHM: ${{ secrets.FEISHU_WEBHOOK_SHM }}
          REMINDER_ORG: ${{ github.event_name == 'workflow_dispatch' && inputs.org || '' }}
          FORCE_SEND: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '1' || '0' }}
        run: |
          set +e
          node scripts/send-duty-reminder.mjs
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit reminder state
        if: always()
        run: |
          if [ -n "$(git status --porcelain data/orgs)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/orgs/*/reminder-state.json
            git commit -m "chore: duty reminder sent $(TZ=Asia/Shanghai date +%Y-%m-%d)"
            git pull --rebase --autostash
            git push
          else
            echo "状态文件无变化（今天已发过或本次未发送），跳过提交。"
          fi

      - name: Fail workflow when reminder has errors
        if: ${{ steps.send_reminder.outputs.exit_code != '0' }}
        run: exit "${{ steps.send_reminder.outputs.exit_code }}"
