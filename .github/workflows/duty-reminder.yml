name: Duty Reminder

on:
  schedule:
    # GitHub schedule 用 UTC，括号内为北京时间。故意避开整点（整点负载高，最易被延迟或丢弃）。
    # 早上时段错峰触发 5 次：任一次被执行即发出当天提醒；
    # 脚本用 data/reminder-state.json 去重，保证一天只发一条。
    - cron: "5 1 * * *"   # 北京 09:05
    - cron: "25 1 * * *"  # 北京 09:25
    - cron: "45 1 * * *"  # 北京 09:45
    - cron: "10 2 * * *"  # 北京 10:10
    - cron: "40 2 * * *"  # 北京 10:40
  workflow_dispatch:
    inputs:
      force:
        description: "跳过去重，强制发送一条（用于测试）"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: duty-reminder
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send Feishu duty reminder
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          PUBLIC_ROSTER_URL: https://drizeele2026.github.io/work/
          FORCE_SEND: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '1' || '0' }}
        run: node scripts/send-duty-reminder.mjs

      - name: Commit reminder state
        run: |
          if [ -n "$(git status --porcelain data/reminder-state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/reminder-state.json
            git commit -m "chore: duty reminder sent $(TZ=Asia/Shanghai date +%Y-%m-%d)"
            git pull --rebase --autostash
            git push
          else
            echo "状态文件无变化（今天已发过或本次未发送），跳过提交。"
          fi
