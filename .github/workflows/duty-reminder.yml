name: Duty Reminder

on:
  schedule:
    # Test mode: GitHub Actions scheduled workflows support 5 minutes as the shortest interval.
    # Production 09:00 Asia/Shanghai: 0 1 * * *
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Feishu duty reminder
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          PUBLIC_ROSTER_URL: https://drizeele2026.github.io/work/
        run: node scripts/send-duty-reminder.mjs
